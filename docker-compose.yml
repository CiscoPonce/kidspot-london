
services:
  postgres:
    image: kartoza/postgis:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kidspot_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: kidspot
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kidspot_admin -d kidspot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://kidspot_admin:${DB_PASSWORD:-password}@postgres:5432/kidspot
      - REDIS_URL=redis://redis:6379
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - ADMIN_KEY=${ADMIN_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - INGEST_SIGNING_SECRET=${INGEST_SIGNING_SECRET}
      - YELP_API_KEY=${YELP_API_KEY}
      - YELP_CLIENT_ID=${YELP_CLIENT_ID}
      - NODE_ENV=production
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    command: npm run worker
    environment:
      - DATABASE_URL=postgres://kidspot_admin:${DB_PASSWORD:-password}@postgres:5432/kidspot
      - REDIS_URL=redis://redis:6379
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://79.72.92.195:4000/api}
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://79.72.92.195:4000/api}
      - NODE_ENV=production
    ports:
      - "3005:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
